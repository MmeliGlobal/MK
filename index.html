<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EliteMarket | Premium E-Commerce</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" id="logo">EliteMarket</div>
      <div class="nav-links">
        <button class="nav-link" data-page="home"><i class="fas fa-home"></i> Home</button>
        <button class="nav-link" data-page="shop">Shop</button>
        <button class="nav-link" data-page="tracking"><i class="fas fa-truck"></i> Track</button>
        <button class="cart-icon-btn" id="cartIconBtn">
          <i class="fas fa-shopping-cart"></i> Cart <span id="cartCount">0</span>
        </button>
        <button class="nav-link" id="authBtn"><i class="fas fa-user"></i> Sign In</button>
      </div>
    </div>
  </nav>

  <!-- Search & Filter Bar -->
  <div class="search-section">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search products...">
      <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    <div class="filter-container">
      <select id="categoryFilter"><option value="">All Categories</option></select>
      <input type="number" id="minPrice" placeholder="Min $">
      <input type="number" id="maxPrice" placeholder="Max $">
      <button id="resetFilterBtn">Reset</button>
    </div>
  </div>

  <!-- Main Content -->
  <main id="app">
    <!-- Home Page -->
    <div id="homePage" class="page active">
      <div class="hero">
        <h1>Premium Quality, Global Delivery</h1>
        <p>Shop the latest trends with fast shipping & secure payment</p>
      </div>
      <div id="featuredProducts" class="products-grid"></div>
    </div>

    <!-- Shop Page -->
    <div id="shopPage" class="page">
      <div id="allProducts" class="products-grid"></div>
      <div id="pagination"></div>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="modal">
      <div class="modal-content product-modal">
        <span class="close-modal">&times;</span>
        <div id="productDetail"></div>
      </div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
      <div class="cart-header">
        <h3>Your Cart</h3>
        <button id="closeCartBtn"><i class="fas fa-times"></i></button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
        <button id="checkoutBtn" class="checkout-btn">Proceed to Checkout</button>
      </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
      <div class="modal-content">
        <h2>Checkout</h2>
        <form id="checkoutForm">
          <input type="text" id="address" placeholder="Shipping Address" required>
          <input type="text" id="city" placeholder="City" required>
          <input type="text" id="zip" placeholder="Postal Code" required>
          <select id="paymentMethod" required>
            <option value="card">Credit Card (Demo)</option>
            <option value="cod">Cash on Delivery</option>
          </select>
          <button type="submit">Place Order</button>
        </form>
      </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="authForms">
          <div class="auth-tabs">
            <button id="loginTab" class="active">Login</button>
            <button id="registerTab">Register</button>
          </div>
          <form id="loginForm">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
          </form>
          <form id="registerForm" style="display:none">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Register</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminPanel" class="page">
      <div class="admin-header">
        <h2>Admin Dashboard</h2>
        <div class="admin-tabs">
          <button data-admin="products">Products</button>
          <button data-admin="orders">Orders</button>
          <button data-admin="users">Users</button>
        </div>
      </div>
      <div id="adminProducts" class="admin-section"></div>
      <div id="adminOrders" class="admin-section" style="display:none"></div>
      <div id="adminUsers" class="admin-section" style="display:none"></div>
    </div>

    <!-- Tracking Page -->
    <div id="trackingPage" class="page">
      <div class="tracking-box">
        <h3>Track Your Order</h3>
        <input type="text" id="trackingId" placeholder="Order ID">
        <button id="trackOrderBtn">Track</button>
        <div id="trackingResult"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 EliteMarket | Premium E-Commerce | <i class="fab fa-whatsapp"></i> +1 234 567 890</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
